appId: com.tidy.app
productName: Tidy
directories:
  output: release
  buildResources: build

files:
  - electron/**/*
  - dist/**/*
  - package.json
  - node_modules/**/*

asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/bplist-parser/**/*

extraMetadata:
  main: electron/main.js

mac:
  category: public.app-category.productivity
  target:
    - dmg
  icon: build/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    NSMicrophoneUsageDescription: "음성 입력을 위해 마이크에 접근합니다."
    NSSpeechRecognitionUsageDescription: "음성을 텍스트로 변환하기 위해 음성 인식을 사용합니다."
    NSFullDiskAccessUsageDescription: "카카오톡, iMessage 등 앱 알림을 감지하기 위해 전체 디스크 접근이 필요합니다."

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
